version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: axano_leadflow
      POSTGRES_USER: axano
      POSTGRES_PASSWORD: ${DB_PASSWORT}
    volumes:
      - postgres_daten:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axano -d axano_leadflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_daten:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - TZ=Europe/Berlin
      - PORT=4000
      - DATENBANK_URL=postgresql://axano:${DB_PASSWORT}@postgres:5432/axano_leadflow
      - REDIS_URL=redis://redis:6379
      - JWT_GEHEIMNIS=${JWT_GEHEIMNIS}
      - REFRESH_TOKEN_GEHEIMNIS=${REFRESH_TOKEN_GEHEIMNIS}
      - VERSCHLUESSELUNGS_SCHLUESSEL=${VERSCHLUESSELUNGS_SCHLUESSEL}
      - API_BASE_URL=${API_BASE_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_BENUTZER=${SMTP_BENUTZER:-}
      - SMTP_PASSWORT=${SMTP_PASSWORT:-}
      - SMTP_ABSENDER_NAME=${SMTP_ABSENDER_NAME:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_GEHEIMNIS=${GOOGLE_CLIENT_GEHEIMNIS:-}
      - OUTLOOK_CLIENT_ID=${OUTLOOK_CLIENT_ID:-}
      - OUTLOOK_CLIENT_GEHEIMNIS=${OUTLOOK_CLIENT_GEHEIMNIS:-}
      - OUTLOOK_TENANT_ID=${OUTLOOK_TENANT_ID:-common}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_VERIFY_TOKEN=${FACEBOOK_VERIFY_TOKEN:-}
      - FACEBOOK_APP_GEHEIMNIS=${FACEBOOK_APP_GEHEIMNIS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_BASE_URL}/api/v1
        - NEXT_PUBLIC_WS_URL=${API_BASE_URL}
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_daten:
  redis_daten:
