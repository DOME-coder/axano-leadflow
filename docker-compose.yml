version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: axano_leadflow
      POSTGRES_USER: axano
      POSTGRES_PASSWORD: ${DB_PASSWORT:-axano_dev_2026}
    volumes:
      - postgres_daten:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axano -d axano_leadflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_daten:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATENBANK_URL=postgresql://axano:${DB_PASSWORT:-axano_dev_2026}@postgres:5432/axano_leadflow
      - REDIS_URL=redis://redis:6379
      - JWT_GEHEIMNIS=${JWT_GEHEIMNIS:-dev-jwt-geheimnis-mindestens-32-zeichen}
      - REFRESH_TOKEN_GEHEIMNIS=${REFRESH_TOKEN_GEHEIMNIS:-dev-refresh-geheimnis-32-zeichen}
      - FRONTEND_URL=http://localhost:3001
      - VERSCHLUESSELUNGS_SCHLUESSEL=${VERSCHLUESSELUNGS_SCHLUESSEL:-0123456789abcdef0123456789abcdef}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - /app/dist

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_daten:
  redis_daten:
